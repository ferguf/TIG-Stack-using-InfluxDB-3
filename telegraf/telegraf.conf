[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = ""
  hostname = "network-node-01"
  omit_hostname = false

# ------------------------------------------------------------------------------
# OUTPUTS: Pointing to InfluxDB 3 Core
# ------------------------------------------------------------------------------
[[outputs.influxdb_v2]]
  ## InfluxDB 3 Core uses port 8181
  urls = ["http://influxdb3-core:8181"]

  ## Use the NEWly generated token
  token = "apiv3_aAcM9fWA-xBEv3DJhD3Zvx-PCjrLFSvbP_s0ArjY8qf8aS1Ac55VKBVssyKvy8mB445W7ryAX-g0zsOiHsaiJg"

  organization = "default"
  
  ## This MUST match the database you just created
  bucket = "network_inventory"

  content_encoding = "identity"
# ------------------------------------------------------------------------------
# INPUTS: HTTP Listener - Endpoint for FastAPI Simulation
# ------------------------------------------------------------------------------

[[inputs.http_listener_v2]]
  service_address = ":8080"
  
  ## FIX: The key must be 'paths' (plural) and formatted as an array
  paths = ["/telegraf"]
  
  methods = ["POST"]
  data_format = "influx"

# ------------------------------------------------------------------------------
# INPUTS: Project Bread Baker - Metadata Ingestion
# ------------------------------------------------------------------------------

[[inputs.cpu]]
  percpu = true
  totalcpu = true
  report_active = true

[[inputs.mem]]

[[inputs.system]]

[[inputs.file]]
  # This path MUST match the right-side of the volume mapping in docker-compose
  files = ["/app/inventory_lookup.json"]
  interval = "1h"
  data_format = "json_v2"

  [[inputs.file.json_v2]]
    [[inputs.file.json_v2.object]]
        path = "@this"
        disable_prepend_keys = true
        tags = ["device_uuid", "hostname", "site"]
        [inputs.file.json_v2.object.fields]
            status = "string"

# ------------------------------------------------------------------------------
# NOTES & DOCUMENTATION
# ------------------------------------------------------------------------------
